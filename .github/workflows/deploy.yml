# Build the Astro site and deploy the static output to Hostinger via FTP.
#
# Required GitHub repo secrets (Settings > Secrets and variables > Actions):
#   FTP_SERVER    - Hostinger FTP host (e.g. ftp.mindiweik.com or the IP from hPanel > Files > FTP Accounts)
#   FTP_USERNAME  - FTP account username
#   FTP_PASSWORD  - FTP account password
#
# Also confirm `server-dir` below points to the web root for mindiweik.com on your
# Hostinger plan (commonly /public_html/ for the primary domain, or
# /domains/mindiweik.com/public_html/ if it is an addon domain).

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so scheduled posts (future pubDate) go live without a push.
  # 13:00 UTC = 6am Denver in winter (MST), 7am in summer (MDT).
  schedule:
    - cron: '0 13 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/mindiweik.com/public_html/
          # dev/ is the dev.mindiweik.com preview (nested subdomain folder);
          # the prod sync must never delete or overwrite it. exclude replaces
          # the action's defaults, so those are restated.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            dev/**

      # Phase B: wip-podcast.com landing page + 301 redirect map.
      # Enabled 2026-07-02 after wip-podcast.com moved to file hosting.
      - name: Build wip-podcast.com landing page
        run: node scripts/build-wip-landing.mjs

      - name: Deploy wip-podcast.com landing page
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./wip-dist/
          server-dir: /domains/wip-podcast.com/public_html/

      # dev.mindiweik.com preview: same site with draft + scheduled entries
      # visible (dashed chips). Protected by hPanel basic auth on the dev/
      # folder; .htaccess/.htpasswd are excluded so deploys never remove it.
      # Reuses ./dist/ - safe because the prod upload above already finished.
      - name: Build dev preview (drafts + scheduled visible)
        run: npm run build
        env:
          PUBLIC_SHOW_DRAFTS: 'true'
          DEPLOY_SITE: 'https://dev.mindiweik.com'

      - name: Block crawlers on dev preview
        run: |
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt

      - name: Deploy dev preview via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/mindiweik.com/public_html/dev/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.htaccess
            **/.htpasswd*
