# Build the Astro site and deploy the static output to Hostinger via FTP.
#
# Required GitHub repo secrets (Settings > Secrets and variables > Actions):
#   FTP_SERVER    - Hostinger FTP host (e.g. ftp.mindiweik.com or the IP from hPanel > Files > FTP Accounts)
#   FTP_USERNAME  - FTP account username
#   FTP_PASSWORD  - FTP account password
#
# Also confirm `server-dir` below points to the web root for mindiweik.com on your
# Hostinger plan (commonly /public_html/ for the primary domain, or
# /domains/mindiweik.com/public_html/ if it is an addon domain).

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so scheduled posts (future pubDate) go live without a push.
  # Posts flip live at RELEASE_HOUR_UTC (13:00, see src/lib/publish.ts); the build
  # runs at 13:23 UTC because GitHub delays or skips top-of-hour crons under load.
  # 13:23 UTC = ~6:23am Denver in winter (MST), ~7:23am in summer (MDT).
  schedule:
    - cron: '23 13 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Bumped from the 30s default: Hostinger's FTP endpoint has intermittently
          # been slow to accept the connection ("Failed to connect... via FTP"), which
          # failed the deploy. A longer per-operation timeout absorbs a slow handshake.
          timeout: 120000
          local-dir: ./dist/
          server-dir: /domains/mindiweik.com/public_html/
          # dev/ is the dev.mindiweik.com preview (nested subdomain folder);
          # the prod sync must never delete or overwrite it. exclude replaces
          # the action's defaults, so those are restated.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            dev/**

      # Tell IndexNow (Bing and friends; Bing feeds ChatGPT search) about the
      # deployed URL set. Best effort: a failed ping never fails the deploy.
      # The daily cron rebuild pings too, which auto-submits scheduled posts
      # the moment they go live. See scripts/indexnow-ping.mjs.
      - name: Ping IndexNow with the deployed URLs
        run: node scripts/indexnow-ping.mjs
        continue-on-error: true

      # Phase B: wip-podcast.com landing page + 301 redirect map.
      # Enabled 2026-07-02 after wip-podcast.com moved to file hosting.
      - name: Build wip-podcast.com landing page
        run: node scripts/build-wip-landing.mjs

      - name: Deploy wip-podcast.com landing page
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          timeout: 120000 # see note on the prod upload above
          local-dir: ./wip-dist/
          server-dir: /domains/wip-podcast.com/public_html/

      # dev.mindiweik.com preview: same site with draft + scheduled entries
      # visible (dashed chips). Protected by hPanel basic auth on the dev/
      # folder; .htaccess/.htpasswd are excluded so deploys never remove it.
      # Reuses ./dist/ - safe because the prod upload above already finished.
      - name: Build dev preview (drafts + scheduled visible)
        run: npm run build
        env:
          PUBLIC_SHOW_DRAFTS: 'true'
          DEPLOY_SITE: 'https://dev.mindiweik.com'
          GITHUB_TOKEN: ${{ github.token }}

      - name: Block crawlers on dev preview
        run: |
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt

      - name: Deploy dev preview via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          timeout: 120000 # see note on the prod upload above
          local-dir: ./dist/
          server-dir: /domains/mindiweik.com/public_html/dev/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.htaccess
            **/.htpasswd*

  # Post-deploy verification: fetch the live sites and fail the run if any is
  # not serving the expected content. Notification only (FTP has no rollback);
  # value is fast awareness. See scripts/smoke-test.mjs.
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Smoke-test the live sites
        run: node scripts/smoke-test.mjs
