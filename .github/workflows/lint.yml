# Quality gate: lint, format check, and tests on every push and PR.
# Kept separate from deploy.yml so a formatting slip fails fast without
# touching the deploy pipeline.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check formatting)
        run: npm run format:check

      - name: Tests
        run: npm test
