# Quality gate: lint, format, prose, type-check, build, and tests on every
# push and PR. Kept separate from deploy.yml so a slip fails fast without
# touching the deploy pipeline. Since main auto-deploys to prod, the `build`
# job is the seatbelt against a broken build going live.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check formatting)
        run: npm run format:check

      - name: Prose (no emdashes in content)
        run: npm run prose:lint

      - name: Tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Astro type check
        run: npm run check

      - name: Astro build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }}
